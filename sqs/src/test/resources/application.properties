#defined the name of the queue we will use for ministack
queue.url=http://ministack-test:4566/000000000000/test-queue
queue.name=test-queue
queue.visibility.timeout=1

datasource.message-visibility-timeout=1
datasource.keystore=datasource-keystore
datasource.keystore-type=PKCS12
datasource.truststore=$datasource-truststore
datasource.truststore-type=PKCS12
datasource.keystore-password=datasource-keystore-password
datasource.truststore-password=datasource-truststore-password
datasource.queue-bucket=test-bucket
datasource.queue=test-queue

quarkus.sqs.devservices.queues=test-queue
quarkus.sqs.devservices.container-properties.HOSTNAME_EXTERNAL=ministack-test
quarkus.sqs.devservices.container-properties.SQS_PORT_EXTERNAL=4566

# createt a ministack bucket
quarkus.s3.devservices.buckets=${datasource.queue-bucket}

# needed for injectSpy in SqsServiceTest
quarkus.arc.remove-unused-beans=false
